# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - fintrack-rg

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build solution
        run: dotnet build "FinTrack/FinTrack.sln" --configuration Release

      - name: Publish API project
        run: dotnet publish "FinTrack/FinTrack.Server/FinTrack.Server.csproj" -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E35A97064FE0496388AA627E7EE2F078 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_99B5C6DEFDBF4B59B8C8E0DEB4BF7DA9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_62A6909B948545258C3273C897F51964 }}

      - name: Confirm Azure subscription and app
        run: |
          az account show
          az webapp show --name fintrack-api --resource-group fintrack-rg

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fintrack-api'
          resource-group: 'fintrack-rg'
          slot-name: 'Production'
          package: './.net-app'
          