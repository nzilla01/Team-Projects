name: Build and deploy ASP.Net Core app to Azure Web App - fintrack-rg

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore "FinTrack/FinTrack.Server/FinTrack.Server.csproj"

      - name: Build
        run: dotnet build "FinTrack/FinTrack.Server/FinTrack.Server.csproj" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "FinTrack/FinTrack.Server/FinTrack.Server.csproj" -c Release -o ./publish --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fintrack-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish